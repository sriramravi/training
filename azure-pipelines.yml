# azure-pipelines.yml
# CheckmarxOne SAST Onboarding Pipeline

trigger: none  # Manual trigger only

parameters:
  - name: ba_number
    displayName: 'BA Number'
    type: string
    
  - name: as_number
    displayName: 'AS Number'
    type: string
    
  - name: repository_url
    displayName: 'Repository URL (format: github.com?owner=org&repo=reponame)'
    type: string
    
  - name: group_name
    displayName: 'Checkmarx Group Name'
    type: string

variables:
  - group: checkmarx-credentials  # Variable group containing secrets
  - name: checkmarx_base_url
    value: 'https://cigna.cxone.cloud'
  - name: ba_number_uc
    value: ${{ upper(parameters.ba_number) }}

stages:
  - stage: CheckmarxOnboarding
    displayName: 'CheckmarxOne SAST Onboarding'
    jobs:
      - job: OnboardRepository
        displayName: 'Onboard Repository to CheckmarxOne'
        pool:
          vmImage: 'ubuntu-latest'
        
        steps:
          # STEP 1: Display Input Parameters
          - task: Bash@3
            displayName: '📋 Display Input Parameters'
            inputs:
              targetType: 'inline'
              script: |
                echo "════════════════════════════════════════════════════════════"
                echo "CHECKMARX ONE SAST ONBOARDING - INPUT PARAMETERS"
                echo "════════════════════════════════════════════════════════════"
                echo "BA Number: ${{ parameters.ba_number }}"
                echo "BA Number (Uppercase): $(ba_number_uc)"
                echo "AS Number: ${{ parameters.as_number }}"
                echo "Repository: ${{ parameters.repository_url }}"
                echo "Group Name: ${{ parameters.group_name }}"
                echo "════════════════════════════════════════════════════════════"

          # STEP 2: Authenticate with CheckmarxOne
          - task: Bash@3
            displayName: '🔐 Authenticate with CheckmarxOne'
            inputs:
              targetType: 'inline'
              script: |
                echo "════════════════════════════════════════════════════════════"
                echo "STEP 2: AUTHENTICATING WITH CHECKMARX ONE"
                echo "════════════════════════════════════════════════════════════"
                echo "API Endpoint: $(checkmarx_base_url)/identity/connect/token"
                echo "Method: POST"
                echo "Authentication Type: OAuth2 Client Credentials"
                
                # Simulate API call (replace with actual curl in production)
                echo ""
                echo "🔄 Making authentication request..."
                echo "✓ Authentication Successful (SIMULATED)"
                echo "✓ Access Token: eyJhbGciOiJSUzI1NiIsInR5cCI... (SIMULATED)"
                echo "✓ Token Expiry: 3600 seconds"
                echo "════════════════════════════════════════════════════════════"

          # STEP 3: Search for Application
          - task: Bash@3
            displayName: '🔍 Search for Application'
            inputs:
              targetType: 'inline'
              script: |
                echo "════════════════════════════════════════════════════════════"
                echo "STEP 3: SEARCHING FOR APPLICATION"
                echo "════════════════════════════════════════════════════════════"
                echo "API Endpoint: GET $(checkmarx_base_url)/api/applications?name=$(ba_number_uc)"
                echo "Searching for: $(ba_number_uc)"
                
                # Simulate API call
                echo ""
                echo "🔄 Searching for application..."
                echo "✓ Application Found (SIMULATED)"
                echo "✓ Application ID: app-$(ba_number_uc)-simulated-id"
                echo "✓ Application Name: $(ba_number_uc)"
                echo "✓ Criticality: 3 (Medium)"
                
                # Export for later steps
                echo "##vso[task.setvariable variable=application_id]app-$(ba_number_uc)-simulated-id"
                echo "════════════════════════════════════════════════════════════"

          # STEP 4: Validate Group
          - task: Bash@3
            displayName: '👥 Validate Group'
            inputs:
              targetType: 'inline'
              script: |
                echo "════════════════════════════════════════════════════════════"
                echo "STEP 4: VALIDATING GROUP"
                echo "════════════════════════════════════════════════════════════"
                echo "API Endpoint: GET $(checkmarx_base_url)/api/access-management/groups?name=${{ parameters.group_name }}"
                echo "Searching for: ${{ parameters.group_name }}"
                
                # Simulate API call
                echo ""
                echo "🔄 Searching for group..."
                echo "✓ Group Found (SIMULATED)"
                echo "✓ Group ID: group-simulated-id-12345"
                echo "✓ Group Name: ${{ parameters.group_name }}"
                
                # Export for later steps
                echo "##vso[task.setvariable variable=group_id]group-simulated-id-12345"
                echo "════════════════════════════════════════════════════════════"

          # STEP 5: Extract SCM Details
          - task: Bash@3
            displayName: '📦 Extract SCM Details'
            inputs:
              targetType: 'inline'
              script: |
                echo "════════════════════════════════════════════════════════════"
                echo "STEP 5: EXTRACTING SCM DETAILS"
                echo "════════════════════════════════════════════════════════════"
                echo "Input Repository: ${{ parameters.repository_url }}"
                echo ""
                
                # Extract organization from query parameter
                REPO_URL="${{ parameters.repository_url }}"
                SCM_ORG=$(echo "$REPO_URL" | grep -oP 'owner=\K[^&]+')
                REPO_NAME=$(echo "$REPO_URL" | grep -oP 'repo=\K[^&]+')
                SCM_HOST=$(echo "$REPO_URL" | sed 's/?.*//; s|https\?://||')
                
                # Remove .git suffix if present
                REPO_NAME=$(echo "$REPO_NAME" | sed 's/\.git$//')
                
                FULL_REPO_NAME="${SCM_ORG}/${REPO_NAME}"
                FULL_REPO_URL="https://${SCM_HOST}/${SCM_ORG}/${REPO_NAME}"
                
                echo "Extracted Details:"
                echo "- SCM Host: ${SCM_HOST}"
                echo "- Organization: ${SCM_ORG}"
                echo "- Repository: ${REPO_NAME}"
                echo "- Full Repo Name: ${FULL_REPO_NAME}"
                echo "- Full Repo URL: ${FULL_REPO_URL}"
                
                # Export for later steps
                echo "##vso[task.setvariable variable=scm_org]${SCM_ORG}"
                echo "##vso[task.setvariable variable=repo_name]${REPO_NAME}"
                echo "##vso[task.setvariable variable=full_repo_name]${FULL_REPO_NAME}"
                echo "##vso[task.setvariable variable=full_repo_url]${FULL_REPO_URL}"
                echo "════════════════════════════════════════════════════════════"

          # STEP 6: Check if Project Exists
          - task: Bash@3
            displayName: '🔎 Check if Project Exists'
            inputs:
              targetType: 'inline'
              script: |
                echo "════════════════════════════════════════════════════════════"
                echo "STEP 6: CHECKING IF PROJECT EXISTS"
                echo "════════════════════════════════════════════════════════════"
                echo "API Endpoint: GET $(checkmarx_base_url)/api/projects?name=$(full_repo_name)"
                echo "Searching for: $(full_repo_name)"
                
                # Simulate API call
                echo ""
                echo "🔄 Searching for project..."
                echo "✓ Project NOT Found (SIMULATED)"
                echo "✓ Will proceed with project creation"
                
                # Export project exists flag
                echo "##vso[task.setvariable variable=project_exists]false"
                echo "════════════════════════════════════════════════════════════"

          # STEP 7: Create Project
          - task: Bash@3
            displayName: '➕ Create Project in CheckmarxOne'
            condition: eq(variables['project_exists'], 'false')
            inputs:
              targetType: 'inline'
              script: |
                echo "════════════════════════════════════════════════════════════"
                echo "STEP 7: CREATING NEW PROJECT"
                echo "════════════════════════════════════════════════════════════"
                echo "API Endpoint: POST $(checkmarx_base_url)/api/projects"
                echo ""
                echo "Request Body:"
                echo "  name: $(full_repo_name)"
                echo "  groups: [$(group_id)]"
                echo "  repoUrl: $(full_repo_url)"
                echo "  mainBranch: main"
                echo "  origin: Azure-DevOps-Pipeline"
                echo "  tags:"
                echo "    application: $(ba_number_uc)"
                echo "    asNumber: ${{ parameters.as_number }}"
                echo "    scmConnected: true"
                echo "  criticality: 3"
                echo ""
                
                # Simulate API call
                echo "🔄 Creating project..."
                PROJECT_ID="project-simulated-id-67890"
                PROJECT_URL="$(checkmarx_base_url)/projects/${PROJECT_ID}/overview"
                
                echo "✓ Project Created Successfully (SIMULATED)"
                echo "✓ Project ID: ${PROJECT_ID}"
                echo "✓ Project URL: ${PROJECT_URL}"
                
                # Export project details
                echo "##vso[task.setvariable variable=project_id]${PROJECT_ID}"
                echo "##vso[task.setvariable variable=project_url]${PROJECT_URL}"
                echo "##vso[task.setvariable variable=onboarding_status]created"
                echo "════════════════════════════════════════════════════════════"

          # STEP 8: Display Summary
          - task: Bash@3
            displayName: '📊 Onboarding Summary'
            inputs:
              targetType: 'inline'
              script: |
                echo "════════════════════════════════════════════════════════════"
                echo "CHECKMARX ONE SAST ONBOARDING - SUMMARY"
                echo "════════════════════════════════════════════════════════════"
                echo ""
                echo "Input Parameters:"
                echo "✓ BA Number: $(ba_number_uc)"
                echo "✓ AS Number: ${{ parameters.as_number }}"
                echo "✓ Repository: $(full_repo_name)"
                echo "✓ Group: ${{ parameters.group_name }}"
                echo ""
                echo "Simulated API Calls Made:"
                echo "1. POST /identity/connect/token (Authentication)"
                echo "2. GET  /api/applications?name=$(ba_number_uc)"
                echo "3. GET  /api/access-management/groups?name=${{ parameters.group_name }}"
                echo "4. GET  /api/projects?name=$(full_repo_name)"
                echo "5. POST /api/projects (Project Creation)"
                echo ""
                echo "Results (SIMULATED):"
                echo "✓ Application ID: $(application_id)"
                echo "✓ Group ID: $(group_id)"
                echo "✓ Project ID: $(project_id)"
                echo "✓ Project URL: $(project_url)"
                echo "✓ Onboarding Status: $(onboarding_status)"
                echo ""
                echo "Next Steps (In Production):"
                echo "- Project would be created in CheckmarxOne"
                echo "- Automatic scan would be triggered"
                echo "- Email notifications would be sent"
                echo "- Project would appear in CheckmarxOne console"
                echo ""
                echo "⚠️  THIS WAS A SIMULATION - No actual API calls were made"
                echo "════════════════════════════════════════════════════════════"

          # STEP 9: Simulate Email Notification
          - task: Bash@3
            displayName: '📧 Email Notification (Simulated)'
            inputs:
              targetType: 'inline'
              script: |
                echo "════════════════════════════════════════════════════════════"
                echo "EMAIL NOTIFICATION (SIMULATED)"
                echo "════════════════════════════════════════════════════════════"
                echo "To: stakeholders@company.com"
                echo "From: no-reply@cigna.com"
                echo "Subject: CheckmarxOne SAST Onboarding - Project Created"
                echo ""
                echo "Body:"
                echo "Dear Stakeholder,"
                echo ""
                echo "Your repository '$(full_repo_name)' has been successfully"
                echo "onboarded to CheckmarxOne ($(ba_number_uc))."
                echo ""
                echo "Project URL: $(project_url)"
                echo ""
                echo "Thank you,"
                echo "Product Security Team"
                echo "════════════════════════════════════════════════════════════"

          # STEP 10: Publish Results (Optional)
          - task: PublishBuildArtifacts@1
            displayName: '📤 Publish Onboarding Results'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'checkmarx-onboarding-results'
