---
# CheckmarxOne SAST Onboarding - Azure DevOps POC (Simulation Mode)
# This playbook simulates the onboarding process without making actual API calls

- name: CheckmarxOne SAST Onboarding Simulation
  hosts: localhost
  gather_facts: yes
  
  vars_prompt:
    - name: ba_number
      prompt: "Enter BA Number"
      private: no
      
    - name: as_number
      prompt: "Enter AS Number"
      private: no
      
    - name: repository
      prompt: "Enter Repository URL"
      private: no
      
    - name: group_name
      prompt: "Enter Checkmarx Group Name"
      private: no

  tasks:
    # --- STEP 1: NORMALIZE BA NUMBER ---
    - name: "[SIMULATION] Normalize BA Number"
      debug:
        msg: |
          ════════════════════════════════════════════════════════════
          STEP 1: NORMALIZING BA NUMBER
          ════════════════════════════════════════════════════════════
          Input BA Number: {{ ba_number }}
          Normalized BA Number: {{ ba_number | upper | trim }}
          ════════════════════════════════════════════════════════════

    - name: Set normalized BA number
      set_fact:
        ba_number_uc: "{{ ba_number | upper | trim }}"

    # --- STEP 2: AUTHENTICATE WITH CHECKMARX ONE ---
    - name: "[SIMULATION] Authenticate with CheckmarxOne"
      debug:
        msg: |
          ════════════════════════════════════════════════════════════
          STEP 2: AUTHENTICATING WITH CHECKMARX ONE
          ════════════════════════════════════════════════════════════
          API Endpoint: {{ checkmarx_base_url | default('https://cigna.cxone.cloud') }}/identity/connect/token
          Method: POST
          Authentication Type: OAuth2 Client Credentials
          Status: ✓ Authentication Successful (SIMULATED)
          Access Token: eyJhbGciOiJSUzI1NiIsInR5cCI... (SIMULATED)
          Token Expiry: {{ (ansible_date_time.epoch | int + 3600) }}
          ════════════════════════════════════════════════════════════

    # --- STEP 3: SEARCH FOR APPLICATION ---
    - name: "[SIMULATION] Search for Application by BA Number"
      debug:
        msg: |
          ════════════════════════════════════════════════════════════
          STEP 3: SEARCHING FOR APPLICATION
          ════════════════════════════════════════════════════════════
          API Endpoint: /api/applications?name={{ ba_number_uc }}
          Method: GET
          Searching for: {{ ba_number_uc }}
          Result: Application found (SIMULATED)
          Application ID: app-{{ ba_number_uc | lower }}-simulated-id
          Application Name: {{ ba_number_uc }}
          Criticality: 3 (Medium)
          ════════════════════════════════════════════════════════════

    - name: Set simulated application ID
      set_fact:
        application_id: "app-{{ ba_number_uc | lower }}-simulated-id"

    # --- STEP 4: VALIDATE GROUP ---
    - name: "[SIMULATION] Search for Group"
      debug:
        msg: |
          ════════════════════════════════════════════════════════════
          STEP 4: VALIDATING GROUP
          ════════════════════════════════════════════════════════════
          API Endpoint: /api/access-management/groups?name={{ group_name }}
          Method: GET
          Searching for: {{ group_name }}
          Result: Group found (SIMULATED)
          Group ID: group-{{ group_name | lower | regex_replace('[^a-z0-9]', '') }}-simulated-id
          Group Name: {{ group_name }}
          ════════════════════════════════════════════════════════════

    - name: Set simulated group ID
      set_fact:
        group_id: "group-{{ group_name | lower | regex_replace('[^a-z0-9]', '') }}-simulated-id"

    # --- STEP 5: EXTRACT SCM DETAILS ---
    - name: "[SIMULATION] Extract SCM Details"
      debug:
        msg: |
          ════════════════════════════════════════════════════════════
          STEP 5: EXTRACTING SCM DETAILS
          ════════════════════════════════════════════════════════════
          Input Repository: {{ repository }}
          
    - name: Extract SCM host
      set_fact:
        scm_host: "{{ (repository.split('?')[0]) | regex_replace('^https?://', '') | trim }}"

    # Extract organization name from query-parameter formatted repository URL (e.g., github.com?owner=myorg&repo=myrepo)
    - name: Extract SCM org (query-param style)
      set_fact:
        scm_org: >-
          {% set match = repository | regex_findall('owner=([^&]+)') %}
          {{ (match[0] if match | length > 0 else 'unknown-org') | trim }}

    - name: Extract repo only (query-param style)
      set_fact:
        repo_only: >-
          {% set match = repository | regex_findall('repo=([^&]+)') %}
          {{ (match[0] if match | length > 0 else 'unknown-repo') | trim }}

    - name: Fallback org/repo from path style if missing
      set_fact:
        scm_org: "{{ repository.split('/')[-2] | trim }}"
        repo_only: "{{ repository.split('/')[-1] | trim }}"
      when: scm_org == 'unknown-org' or repo_only == 'unknown-repo'

    - name: Normalize repo name (strip .git)
      set_fact:
        repo_only: "{{ repo_only | regex_replace('\\.git$', '') }}"

    - name: Build normalized repo name and full URL
      set_fact:
        repo_name: "{{ scm_org | trim }}/{{ repo_only | trim }}"
        full_repo_url: "https://{{ scm_host | trim }}/{{ scm_org | trim }}/{{ repo_only | trim }}"

    - name: "[SIMULATION] Display Extracted SCM Details"
      debug:
        msg: |
          Extracted SCM Details:
          - SCM Host: {{ scm_host }}
          - Organization: {{ scm_org }}
          - Repository: {{ repo_only }}
          - Full Repo Name: {{ repo_name }}
          - Full Repo URL: {{ full_repo_url }}
          ════════════════════════════════════════════════════════════

    # --- STEP 6: CHECK IF PROJECT EXISTS ---
    - name: "[SIMULATION] Search for Project"
      debug:
        msg: |
          ════════════════════════════════════════════════════════════
          STEP 6: CHECKING IF PROJECT EXISTS
          ════════════════════════════════════════════════════════════
          API Endpoint: /api/projects?name={{ repo_name }}
          Method: GET
          Searching for: {{ repo_name }}
          Result: Project NOT found - Will create new project (SIMULATED)
          ════════════════════════════════════════════════════════════

    # --- STEP 7: CREATE PROJECT ---
    - name: "[SIMULATION] Create New Project"
      debug:
        msg: |
          ════════════════════════════════════════════════════════════
          STEP 7: CREATING NEW PROJECT
          ════════════════════════════════════════════════════════════
          API Endpoint: /api/projects
          Method: POST
          
          Request Body:
            name: {{ repo_name }}
            groups: [{{ group_id }}]
            repoUrl: {{ full_repo_url }}
            mainBranch: main
            origin: Azure-DevOps-POC
            tags:
              application: {{ ba_number_uc }}
              asNumber: {{ as_number }}
              scmConnected: true
            criticality: 3
          
          Response (SIMULATED):
            Project ID: project-{{ repo_name | lower | regex_replace('[^a-z0-9]', '-') }}-simulated-id
            Status: Created ✓
            Project URL: https://cigna.cxone.cloud/projects/project-{{ repo_name | lower | regex_replace('[^a-z0-9]', '-') }}-simulated-id/overview
          ════════════════════════════════════════════════════════════

    - name: Set simulated project ID
      set_fact:
        project_id: "project-{{ repo_name | lower | regex_replace('[^a-z0-9]', '-') }}-simulated-id"
        project_url: "https://cigna.cxone.cloud/projects/project-{{ repo_name | lower | regex_replace('[^a-z0-9]', '-') }}-simulated-id/overview"

    # --- STEP 8: FINAL SUMMARY ---
    - name: "[SIMULATION] Onboarding Summary"
      debug:
        msg: |
          ════════════════════════════════════════════════════════════
          CHECKMARX ONE SAST ONBOARDING - SIMULATION COMPLETE
          ════════════════════════════════════════════════════════════
          
          Input Parameters:
          ✓ BA Number: {{ ba_number_uc }}
          ✓ AS Number: {{ as_number }}
          ✓ Repository: {{ repo_name }}
          ✓ Group: {{ group_name }}
          
          Simulated API Calls Made:
          1. POST /identity/connect/token (Authentication)
          2. GET  /api/applications?name={{ ba_number_uc }} (Application Search)
          3. GET  /api/access-management/groups?name={{ group_name }} (Group Search)
          4. GET  /api/projects?name={{ repo_name }} (Project Search)
          5. POST /api/projects (Project Creation)
          
          Results (SIMULATED):
          ✓ Application ID: {{ application_id }}
          ✓ Group ID: {{ group_id }}
          ✓ Project ID: {{ project_id }}
          ✓ Project URL: {{ project_url }}
          ✓ Onboarding Status: SUCCESS
          
          Next Steps (In Production):
          - Project would be created in CheckmarxOne
          - Automatic scan would be triggered
          - Email notifications would be sent
          - Project would appear in CheckmarxOne console
          
          This was a SIMULATION - No actual API calls were made.
          ════════════════════════════════════════════════════════════

    # --- STEP 9: SIMULATE EMAIL NOTIFICATION ---
    - name: "[SIMULATION] Email Notification"
      debug:
        msg: |
          ════════════════════════════════════════════════════════════
          EMAIL NOTIFICATION (SIMULATED)
          ════════════════════════════════════════════════════════════
          To: stakeholders@company.com
          From: no-reply@cigna.com
          Subject: CheckmarxOne SAST Onboarding - Project Created Successfully
          
          Body:
          Dear Stakeholder,
          
          Your repository "{{ repo_name }}" has been successfully 
          onboarded to CheckmarxOne ({{ ba_number_uc }}).
          
          You can check scan status here:
          {{ project_url }}
          
          Thank you,
          Product Security Team
          ════════════════════════════════════════════════════════════
